<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelsup Smart To-Do List</title>
    
    <link rel="stylesheet" href="to-do-list.css">
</head>
<body>

    <div class="todo-container">
        <h2>Pelsup To-Do List</h2>
        
        <p id="taskCounter">0 tasks remaining</p>
        <p id="clockDisplay"></p>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="What needs to be done?">
            <button id="addBtn">Add Task</button>
            <button id="clearAllBtn" style="background-color: #6c757d; margin-top: 10px;">Clear All</button>
        </div>

        <ul id="todoList"></ul>
    </div>

    <script src="to-do-list.js"></script>
</body>
</html>
